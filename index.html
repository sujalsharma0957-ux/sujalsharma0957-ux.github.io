<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujal Sharma Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

/* Header */
.header {
    padding: 50px 20px;
}

/* Profile Image */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #58a6ff;
    object-fit: cover;
}

/* Name */
h1 {
    margin-top: 15px;
    font-size: 32px;
}

/* Subtitle */
p {
    color: #cbd5e1;
    font-size: 16px;
}

/* Section */
.section {
    margin-top: 40px;
    padding: 20px;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    background: #2563eb;
    transition: 0.3s;
}

.btn:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}

/* Social Links */
.links a {
    margin: 0 10px;
    color: #58a6ff;
    text-decoration: none;
    font-size: 18px;
}

.links a:hover {
    text-decoration: underline;
}
</style>

</head>

<!-- HEADER -->
<div class="header">

    <!-- Profile Image (replace with your image link) -->
    <img src="https://via.placeholder.com/120" class="profile-img">

    <h1>Hey, I am Sujal Sharma 👋</h1>

        I love coding, AI, and building projects.
        Currently learning development .
    </p>
</div>

<!-- SOCIAL LINKS -->

    |
