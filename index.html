<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujal Sharma Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d1117, #1f2937);
    color: white;
    text-align: center;
}

/* Navbar */
nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    background: rgba(0,0,0,0.3);
}
nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}
nav a:hover {
    color: #58a6ff;
}

/* Hero Section */
.hero {
    margin-top: 100px;
}

h1 {
    font-size: 40px;
}

span {
    color: #58a6ff;
}

p {
    color: #ccc;
}

/* Button */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 10px 20px;
    border-radius: 20px;
    background: #58a6ff;
    color: white;
    text-decoration: none;
}

/* Section */
.section {
    margin-top: 80px;
}

/* Cards */
.card {
    background: #161b22;
    margin: 10px;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
    width: 250px;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
</nav>

<!-- Hero -->
<div class="hero">
    <h1>Hey, I am <span>Sujal Sharma</span> 👋</h1>
    <p>Aspiring Developer | Future Scientist 🚀</p>
    <a href="https://github.com/unknownuser68531-sketch" class="btn">View GitHub</a>
</div>

<!-- About -->
<div id="about" class="section">
    <h2>About Me</h2>
    <p>
        I am a B.Tech CSE student passionate about coding, AI, and building cool projects.
    </p>
</div>

<!-- Projects -->
<div id="projects" class="section">
    <h2>My Projects</h2>

    <div class="card">
        <h3>Calculator</h3>
        <p>Simple Python Calculator</p>
    </div>

    <div class="card">
        <h3>Portfolio</h3>
        <p>This website built using HTML & CSS</p>
    </div>

</div>

</body>
</html>
